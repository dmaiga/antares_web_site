{% load i18n static %}

<section class="py-4 md:py-16 bg-slate-50">
  <div class="container mx-auto px-6 max-w-7xl">
    
    <div class="rounded-3xl p-8 md:p-16 text-center shadow-2xl relative overflow-hidden" 
         style="background: #002147;"> <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -mr-32 -mt-32"></div>
      <div class="absolute bottom-0 left-0 w-32 h-32 bg-antares-orange/10 rounded-full -ml-16 -mb-16"></div>
      
      <div class="relative z-10 max-w-4xl mx-auto">
        <h2 class="text-3xl md:text-5xl font-black text-white mb-6 leading-tight italic">
          {% trans "Prêt à collaborer avec nous ?" %}
        </h2>
        
        <p class="text-blue-100/80 text-lg md:text-xl font-light mb-10 max-w-2xl mx-auto">
          {% trans "Rejoignez les organisations qui nous font confiance pour structurer et valoriser leur capital humain." %}
        </p>

        <div class="flex flex-col md:flex-row justify-center items-center gap-4">
          
          <a href="{% url 'jobs' %}"  class="btn btn-lg bg-white border-white text-[#002147] hover:bg-slate-100 font-bold px-8 rounded-xl w-full md:w-auto transition-all shadow-lg">
            {% trans "Voir nos Offres" %}
          </a>

          <a href="{% url 'espace_entreprise' %}"  class="btn btn-lg bg-antares-orange border-antares-orange text-slate-900 hover:bg-[#E59622] font-bold px-10 rounded-xl w-full md:w-auto transition-all shadow-lg scale-105">
            {% trans "Devenir Client" %}
          </a>

          <a href="{% url 'services' %}"  class="btn btn-lg bg-white/10 border-white/20 text-white hover:bg-white/20 font-bold px-8 rounded-xl w-full md:w-auto transition-all">
            {% trans "Nos services" %}
          </a>

        </div>
      </div>
    </div>

  </div>
</section>

<footer class="relative text-white pt-12 pb-6 overflow-hidden" 
        style="background: linear-gradient(90deg, #002147 0%, #003263 100%);">
    </footer>
