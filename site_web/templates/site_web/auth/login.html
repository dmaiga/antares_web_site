{% extends 'base.html' %}
{% load i18n static %}

{% block content %}
<section class="bg-white overflow-hidden lg:py-4">

    <div class="max-w-6xl mx-auto lg:rounded-[2rem] lg:shadow-2xl overflow-hidden">

        <div class="grid lg:grid-cols-2 min-h-[620px]">

            <!-- FORM -->
            <div class="flex items-center justify-center px-6 py-8 lg:px-12 bg-white">

                <div class="w-full max-w-[360px]">

                    <!-- HEADER -->
                    <div class="mb-6">

                        <span class="text-antares-blue font-black uppercase tracking-[0.22em] text-[10px]">
                            {% trans "Espace Personnel" %}
                        </span>

                        <h1 class="mt-2 text-3xl font-black text-slate-900 tracking-tighter leading-tight">
                            {% trans "Accédez à votre espace" %}
                        </h1>


                    </div>

                    <!-- FORM -->
                    <form method="POST" class="space-y-4">

                        {% csrf_token %}

                        <!-- USERNAME -->
                        <div class="space-y-1.5">

                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">
                                {% trans "Email ou téléphone" %}
                            </label>

                            <input type="text"
                                   name="username"
                                   required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-antares-blue outline-none transition-all text-sm font-semibold text-slate-900">

                        </div>

                        <!-- PASSWORD -->
                        <div class="space-y-1.5">

                            <div class="flex justify-between items-center px-1">

                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">
                                    {% trans "Mot de passe" %}
                                </label>

                                <a href="#"
                                   class="text-[10px] font-bold text-antares-blue hover:underline uppercase tracking-tight">

                                    {% trans "Oublié ?" %}

                                </a>

                            </div>

                            <div class="relative">

                                <input type="password"
                                       id="password_input"
                                       name="password"
                                       required
                                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-antares-blue outline-none transition-all text-sm font-semibold text-slate-900">

                                <button type="button"
                                        onclick="togglePassword()"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-antares-blue transition-colors">

                                    <svg class="w-4 h-4"
                                         fill="none"
                                         stroke="currentColor"
                                         viewBox="0 0 24 24">

                                        <path stroke-linecap="round"
                                              stroke-linejoin="round"
                                              stroke-width="2"
                                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                                        </path>

                                        <path stroke-linecap="round"
                                              stroke-linejoin="round"
                                              stroke-width="2"
                                              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                        </path>

                                    </svg>

                                </button>

                            </div>

                        </div>

                        <!-- REMEMBER -->
                        <div class="flex items-center gap-2 px-1 pt-1">

                            <input type="checkbox"
                                   id="remember"
                                   name="remember"
                                   class="w-3.5 h-3.5 rounded border-slate-300 text-antares-blue focus:ring-antares-blue">

                            <label for="remember"
                                   class="text-[11px] font-medium text-slate-500 cursor-pointer">

                                {% trans "Se souvenir de moi" %}

                            </label>

                        </div>

                        <!-- BUTTON -->
                        <div class="pt-2">

                            <button type="submit"
                                    class="w-full py-3.5 bg-antares-orange text-white rounded-xl font-black uppercase tracking-[0.18em] text-[11px] hover:brightness-105 transition-all">

                                {% trans "Connexion" %}

                            </button>

                        </div>

                        <!-- REGISTER -->
                        <div class="pt-4 border-t border-slate-100">

                            <p class="text-center text-xs text-slate-500">

                                {% trans "Pas encore de compte ?" %}

                                <a href="{% url 'register' %}"
                                   class="ml-1 font-black text-antares-blue hover:underline">

                                    {% trans "Créer un compte" %}

                                </a>

                            </p>

                        </div>

                    </form>

                </div>

            </div>

            <!-- IMAGE -->
            <div class="hidden lg:block relative h-full">

                <img src="{% static 'images/home/about_image.webp' %}" 
                     alt="Antarès RH"
                     class="w-full h-full object-cover">

            </div>

        </div>

    </div>

</section>

<script>
    function togglePassword() {
        const input = document.getElementById('password_input');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
{% endblock %}
