{% load i18n static %}

<div class="drawer lg:drawer-open">

    <!-- Toggle -->
    <input id="filter-drawer" type="checkbox" class="drawer-toggle" />

    <!-- Content -->
    <div class="drawer-content">

        <!-- Mobile Button -->
        <div class="lg:hidden mb-6">
            <label 
                for="filter-drawer"
                class="
                    flex items-center justify-center gap-2
                    w-full
                    px-5 py-4

                    rounded-2xl
                    border border-slate-200
                    bg-white

                    text-[11px]
                    font-black
                    uppercase
                    tracking-[0.2em]
                    text-slate-700
                "
            >
                <i class="bi bi-sliders2"></i>
                {% trans "Filtres" %}
            </label>
        </div>

    </div>

    <!-- Sidebar -->
    <div class="drawer-side z-40">

        <!-- Overlay -->
        <label for="filter-drawer" class="drawer-overlay"></label>

        <!-- Panel -->
        <aside class="
            min-h-full
            w-[300px]

            bg-white
            border-r border-slate-100

            px-6 py-8
        ">

            <!-- Header -->
            <div class="flex items-center justify-between mb-8">

                <div>
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-900">
                        {% trans "Filtres" %}
                    </h3>

                    <p class="text-sm text-slate-500 mt-1">
                        {% trans "Affiner les offres" %}
                    </p>
                </div>

                <!-- Close -->
                <label 
                    for="filter-drawer"
                    class="lg:hidden text-slate-400 text-lg cursor-pointer"
                >
                    ✕
                </label>

            </div>

            <!-- Search -->
            <div class="mb-8">

                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-3">
                    {% trans "Recherche" %}
                </label>

                <div class="relative">

                    <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                    <input
                        type="text"
                        placeholder="{% trans 'Poste, entreprise...' %}"
                        class="
                            w-full
                            rounded-2xl
                            border border-slate-200

                            bg-slate-50

                            py-4 pl-11 pr-4

                            text-sm
                            text-slate-700
                            placeholder:text-slate-400

                            focus:outline-none
                            focus:border-antares-blue
                            focus:bg-white
                        "
                    >

                </div>

            </div>

            <!-- Contrats -->
            <div class="mb-8">

                <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">
                    {% trans "Type de contrat" %}
                </h4>

                <div class="space-y-3">

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="checkbox checkbox-sm border-slate-300 rounded-md" />
                        <span class="text-sm text-slate-700">CDI</span>
                    </label>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="checkbox checkbox-sm border-slate-300 rounded-md" />
                        <span class="text-sm text-slate-700">CDD</span>
                    </label>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="checkbox checkbox-sm border-slate-300 rounded-md" />
                        <span class="text-sm text-slate-700">
                            {% trans "Intérim" %}
                        </span>
                    </label>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="checkbox checkbox-sm border-slate-300 rounded-md" />
                        <span class="text-sm text-slate-700">
                            {% trans "Stage" %}
                        </span>
                    </label>

                </div>

            </div>

            <!-- Secteurs -->
            <div class="mb-10">

                <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">
                    {% trans "Secteurs" %}
                </h4>

                <div class="flex flex-wrap gap-2">

                    <!-- Mines -->
                    <label class="cursor-pointer">
                        <input type="checkbox" name="sector" value="mines" class="peer sr-only">

                        <span class="
                            inline-flex items-center justify-center
                            px-4 py-2

                            rounded-xl
                            border border-slate-200
                            bg-slate-50

                            text-[11px]
                            font-semibold
                            text-slate-600

                            peer-checked:bg-antares-blue
                            peer-checked:text-white
                            peer-checked:border-antares-blue
                        ">
                            {% trans "Mines & Énergie" %}
                        </span>
                    </label>

                    <!-- Banque -->
                    <label class="cursor-pointer">
                        <input type="checkbox" name="sector" value="banque" class="peer sr-only">

                        <span class="
                            inline-flex items-center justify-center
                            px-4 py-2

                            rounded-xl
                            border border-slate-200
                            bg-slate-50

                            text-[11px]
                            font-semibold
                            text-slate-600

                            peer-checked:bg-antares-blue
                            peer-checked:text-white
                            peer-checked:border-antares-blue
                        ">
                            {% trans "Banque & Finance" %}
                        </span>
                    </label>

                    <!-- ONG -->
                    <label class="cursor-pointer">
                        <input type="checkbox" name="sector" value="ong" class="peer sr-only">

                        <span class="
                            inline-flex items-center justify-center
                            px-4 py-2

                            rounded-xl
                            border border-slate-200
                            bg-slate-50

                            text-[11px]
                            font-semibold
                            text-slate-600

                            peer-checked:bg-antares-blue
                            peer-checked:text-white
                            peer-checked:border-antares-blue
                        ">
                            {% trans "Humanitaire (ONG)" %}
                        </span>
                    </label>

                    <!-- IT -->
                    <label class="cursor-pointer">
                        <input type="checkbox" name="sector" value="it" class="peer sr-only">

                        <span class="
                            inline-flex items-center justify-center
                            px-4 py-2

                            rounded-xl
                            border border-slate-200
                            bg-slate-50

                            text-[11px]
                            font-semibold
                            text-slate-600

                            peer-checked:bg-antares-blue
                            peer-checked:text-white
                            peer-checked:border-antares-blue
                        ">
                            {% trans "IT & Télécoms" %}
                        </span>
                    </label>

                    <!-- Logistique -->
                    <label class="cursor-pointer">
                        <input type="checkbox" name="sector" value="logistics" class="peer sr-only">

                        <span class="
                            inline-flex items-center justify-center
                            px-4 py-2

                            rounded-xl
                            border border-slate-200
                            bg-slate-50

                            text-[11px]
                            font-semibold
                            text-slate-600

                            peer-checked:bg-antares-blue
                            peer-checked:text-white
                            peer-checked:border-antares-blue
                        ">
                            {% trans "Transport & Log." %}
                        </span>
                    </label>

                </div>

            </div>

            <!-- Reset -->
            <a
                href="."
                class="
                    block
                    w-full

                    text-center

                    rounded-2xl
                    border border-slate-200

                    px-5 py-4

                    text-[11px]
                    font-black
                    uppercase
                    tracking-[0.2em]

                    text-slate-700
                "
            >
                {% trans "Réinitialiser" %}
            </a>

        </aside>

    </div>

</div>
