{% load i18n static %}

<section class="py-16 bg-white">
    <div class="max-w-7xl mx-auto px-6">
        

<div class="pt-16 border-t border-slate-100">
    <div class="flex flex-col lg:flex-row items-center gap-12">

        <div class="w-full lg:w-1/4 text-center lg:text-left">
            <h3 class="text-slate-900 font-black text-xl leading-tight">
                {% trans "Ils nous font" %}<br>
                <span class="text-slate-400">{% trans "confiance." %}</span>
            </h3>
        </div>

        <div class="w-full lg:w-3/4">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-10 items-center grayscale hover:grayscale-0 transition-all duration-700">

                {% for i in clients %}
                <div class="flex justify-center">
                    <img
                        src="{% static 'images/clients/client' %}{{ i }}.webp"
                        alt="Client {{ i }}"
                        class="h-20 md:h-20 object-contain"
                    >
                </div>
                {% endfor %}

            </div>
        </div>

    </div>
</div>

<div class="mt-16 flex flex-wrap justify-center gap-3">

    {% for secteur in secteurs %}
    <span class="px-4 py-2 bg-[#F8F8F8] text-slate-500 text-[10px] font-black uppercase tracking-widest rounded-lg border border-slate-200 hover:border-antares-orange transition-colors">
        {{ secteur }}
    </span>
    {% endfor %}

</div>
    </div>
</section>
