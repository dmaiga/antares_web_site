{% extends "base.html" %}
{% load i18n %}

{% block content %}

<section class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-xl">

        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-xl p-8 md:p-10">

            <div class="flex justify-center mb-6">

                <div class="w-16 h-16 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center">

                    <svg class="w-8 h-8"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2.5"
                              d="M5 13l4 4L19 7">
                        </path>

                    </svg>

                </div>

            </div>

            <div class="text-center space-y-4">

                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100">

                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>

                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-700">
                        {% trans "Validation reçue" %}
                    </span>

                </div>

                <h1 class="text-2xl md:text-3xl font-black text-slate-900 leading-tight">
                    {{ titre }}
                </h1>

                <p class="text-sm md:text-base text-slate-600 leading-relaxed">
                    {{ message }}
                </p>

                <p class="text-sm text-slate-500 leading-relaxed">
                    {{ details }}
                </p>

            </div>

            <div class="mt-8 flex flex-col sm:flex-row gap-3">

                <a href="{% url 'home' %}"
                   class="flex-1 inline-flex items-center justify-center px-6 py-4 bg-slate-900 hover:bg-antares-orange text-white rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] transition-all">

                    {% trans "Accueil" %}

                </a>

                <a href="{% url 'contact' %}"
                   class="flex-1 inline-flex items-center justify-center px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl text-[11px] font-black uppercase tracking-[0.15em] transition-all">

                    {% trans "Contact" %}

                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
